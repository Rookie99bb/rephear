# Render Blueprint — lets Render auto-configure this service from this
# file when you connect the repo (New + -> Blueprint). Env vars marked
# "sync: false" are secrets Render will prompt you to fill in yourself
# instead of storing them here.
#
# NOTE: Starter plan + a 1GB persistent disk mounted at /data. SQLite's
# file lives under DATA_DIR (see src/db/client.ts), which is pointed at
# the disk's mount path below so it survives restarts and redeploys
# instead of resetting to seeded demo data every time.
services:
  - type: web
    name: public-reputation
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      # Render's Node 22.6.0 build doesn't expose node:sqlite without this
      # flag (confirmed by an actual failed deploy: ERR_UNKNOWN_BUILTIN_MODULE).
      - key: NODE_OPTIONS
        value: --experimental-sqlite
      - key: DATA_DIR
        value: /data
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
    disk:
      name: data
      mountPath: /data
      sizeGB: 1

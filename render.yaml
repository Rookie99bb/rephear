# Render Blueprint — lets Render auto-configure this service from this
# file when you connect the repo (New + -> Blueprint). Env vars marked
# "sync: false" are secrets Render will prompt you to fill in yourself
# instead of storing them here.
#
# NOTE: this uses the free plan for speed (no persistent disk — Render's
# free tier doesn't support disks at all, and the service spins down
# after 15 min idle, resetting the SQLite file back to the seeded demo
# data on the next wake-up). Fine for a quick demo. For real persistence
# later, change `plan: free` to `plan: starter` and uncomment the `disk`
# block below.
services:
  - type: web
    name: public-reputation
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
    # disk:
    #   name: data
    #   mountPath: /data
    #   sizeGB: 1

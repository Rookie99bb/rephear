# Render Blueprint — lets Render auto-configure this service from this
# file when you connect the repo (New + -> Blueprint). Env vars marked
# "sync: false" are secrets Render will prompt you to fill in yourself
# instead of storing them here.
#
# NOTE: The database now lives on Turso (a hosted libSQL/SQLite-compatible
# service — see src/db/client.ts), not on this service's own disk. That
# means the free plan is enough again: user data survives redeploys and
# restarts regardless of plan, because it's no longer stored on this
# container's (ephemeral, free-plan) filesystem at all. TURSO_DATABASE_URL
# and TURSO_AUTH_TOKEN below are the only things that make this work —
# without them, the app silently falls back to a local SQLite file that
# is wiped on every redeploy, same as before.
services:
  - type: web
    name: public-reputation
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      # Welcome email (on signup) and the daily "voting update" digest
      # (src/app/api/cron/digest) both no-op with a log line until this
      # is set — see src/lib/email.ts. Get it from resend.com after
      # verifying the rephear.com domain there.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "RepHear <hello@rephear.com>"
      # Shared secret the daily digest scheduler sends as
      # "Authorization: Bearer <value>" to /api/cron/digest.
      - key: CRON_SECRET
        generateValue: true

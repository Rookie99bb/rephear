# Render Blueprint — lets Render auto-configure this service from this
# file when you connect the repo (New + -> Blueprint). Env vars marked
# "sync: false" are secrets Render will prompt you to fill in yourself
# instead of storing them here.
#
# NOTE: Starter plan + a 1GB persistent disk mounted at /data. SQLite's
# file lives under DATA_DIR (see src/db/client.ts), which is pointed at
# the disk's mount path below so it survives restarts and redeploys
# instead of resetting to seeded demo data every time.
services:
  - type: web
    name: public-reputation
    runtime: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      # Render's Node 22.6.0 build doesn't expose node:sqlite without this
      # flag (confirmed by an actual failed deploy: ERR_UNKNOWN_BUILTIN_MODULE).
      - key: NODE_OPTIONS
        value: --experimental-sqlite
      - key: DATA_DIR
        value: /data
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      # Welcome email (on signup) and the daily "voting update" digest
      # (src/app/api/cron/digest) both no-op with a log line until this
      # is set — see src/lib/email.ts. Get it from resend.com after
      # verifying the rephear.com domain there.
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "RepHear <hello@rephear.com>"
      # Shared secret the daily digest scheduler sends as
      # "Authorization: Bearer <value>" to /api/cron/digest.
      - key: CRON_SECRET
        generateValue: true
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
